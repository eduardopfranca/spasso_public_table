<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preços Originação — Grupo Spasso</title>
<style>
  :root {
    --green: #1a7a3f;
    --green-dark: #145c30;
    --ink: #1a2b1f;
    --muted: #6b7c70;
    --line: #e2e8e4;
    --zebra: #f4f8f5;
    --fresh: #1a7a3f;
    --stale: #b45309;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    background: #fff;
    padding: 24px 16px 60px;
    max-width: 1200px;
    margin: 0 auto;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--green);
    padding-bottom: 16px;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand h1 { font-size: 20px; letter-spacing: 0.5px; }
  .brand .sub { font-size: 12px; color: var(--muted); }
  .fresh {
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    font-weight: 600;
  }
  .fresh.ok { background: #e7f4ec; color: var(--fresh); }
  .fresh.old { background: #fdf0e0; color: var(--stale); }
  .filters {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    margin: 20px 0 16px;
  }
  .pills { display: flex; gap: 8px; }
  .pill {
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    padding: 7px 16px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
  }
  .pill.active { background: var(--green); color: #fff; border-color: var(--green); }
  select {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    background: #fff;
  }
  table { width: 100%; border-collapse: collapse; margin-top: 4px; }
  thead th {
    background: var(--green);
    color: #fff;
    text-align: left;
    padding: 12px 14px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  tbody td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }
  tbody tr:nth-child(even) { background: var(--zebra); }
  .count { font-size: 13px; color: var(--muted); margin-top: 10px; text-align: right; }
  .empty { padding: 40px; text-align: center; color: var(--muted); }
  footer {
    margin-top: 40px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
  footer a { color: var(--muted); text-decoration: underline; }
  .loading { padding: 60px; text-align: center; color: var(--muted); }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <div>
        <h1>PREÇOS ORIGINAÇÃO</h1>
        <div class="sub">Grupo Spasso</div>
      </div>
    </div>
    <div id="fresh" class="fresh ok">—</div>
  </header>

  <div class="filters" id="filters" style="display:none">
    <div class="pills" id="commodityPills"></div>
    <select id="pracaFilter"><option value="__all__">Todas as praças</option></select>
  </div>

  <div id="content" class="loading">Carregando…</div>
  <div class="count" id="count"></div>

  <footer>
    <a href="APP_LOGIN_URL">Acesso à plataforma</a>
  </footer>

<script>
  // AJUSTAR: URL do Worker (ex.: https://tabela-spasso.SEU-SUBDOMINIO.workers.dev)
  const WORKER_URL = "WORKER_URL_AQUI";

  let DATA = null;
  let activeCommodity = "__all__";
  let activePraca = "__all__";

  const COMMODITY_COL = "commodity"; // nome da coluna de commodity
  const PRACA_COL = "praca";         // nome da coluna de praça

  async function load() {
    try {
      const res = await fetch(WORKER_URL + "/table");
      if (!res.ok) throw new Error("no table");
      DATA = await res.json();
      render();
    } catch (e) {
      document.getElementById("content").innerHTML =
        '<div class="empty">Nenhuma tabela publicada ainda.</div>';
      document.getElementById("fresh").style.display = "none";
    }
  }

  function fmtFresh(iso) {
    const d = new Date(iso);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    const data = d.toLocaleDateString("pt-BR");
    const hora = d.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
    const el = document.getElementById("fresh");
    el.className = "fresh " + (sameDay ? "ok" : "old");
    el.textContent = "Atualizado em " + data + " às " + hora;
  }

  function uniqueValues(col) {
    const s = new Set();
    DATA.rows.forEach(r => { if (r[col] != null) s.add(r[col]); });
    return [...s].sort();
  }

  function buildFilters() {
    // pills de commodity
    const pills = document.getElementById("commodityPills");
    const commodities = uniqueValues(COMMODITY_COL);
    let html = `<button class="pill active" data-c="__all__">Todas</button>`;
    commodities.forEach(c => {
      html += `<button class="pill" data-c="${c}">${c}</button>`;
    });
    pills.innerHTML = html;
    pills.querySelectorAll(".pill").forEach(b => {
      b.onclick = () => {
        activeCommodity = b.dataset.c;
        pills.querySelectorAll(".pill").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        render();
      };
    });

    // dropdown de praça
    const sel = document.getElementById("pracaFilter");
    const pracas = uniqueValues(PRACA_COL);
    sel.innerHTML = '<option value="__all__">Todas as praças</option>' +
      pracas.map(p => `<option value="${p}">${p}</option>`).join("");
    sel.onchange = () => { activePraca = sel.value; render(); };

    document.getElementById("filters").style.display = "flex";
  }

  function filteredRows() {
    return DATA.rows.filter(r =>
      (activeCommodity === "__all__" || r[COMMODITY_COL] === activeCommodity) &&
      (activePraca === "__all__" || r[PRACA_COL] === activePraca)
    );
  }

  function render() {
    if (!DATA) return;
    fmtFresh(DATA.published_at);
    if (document.getElementById("filters").style.display === "none") buildFilters();

    const rows = filteredRows();
    const cols = DATA.columns;

    if (!rows.length) {
      document.getElementById("content").innerHTML =
        '<div class="empty">Nenhum preço para este filtro.</div>';
      document.getElementById("count").textContent = "";
      return;
    }

    let html = "<table><thead><tr>";
    cols.forEach(c => { html += `<th>${c.label}</th>`; });
    html += "</tr></thead><tbody>";
    rows.forEach(r => {
      html += "<tr>";
      cols.forEach(c => { html += `<td>${r[c.key] ?? ""}</td>`; });
      html += "</tr>";
    });
    html += "</tbody></table>";

    document.getElementById("content").innerHTML = html;
    document.getElementById("count").textContent = rows.length + " praças";
  }

  load();
</script>
</body>
</html>
